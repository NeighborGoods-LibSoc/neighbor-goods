version: '3'

services:
  payload:
    image: node:22-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "yarn install && yarn dev"
    depends_on:
      - mongo
      - postgres
    env_file:
      - .env

  mongo:
    image: mongo:6
    # Exposes DB publicly. Disable for production
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: neighborgoods
      POSTGRES_PASSWORD: neighborgoods
      POSTGRES_DB: neighbor-goods
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  data:
  pgdata:
  node_modules:
